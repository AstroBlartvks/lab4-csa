in_source: |
  \ cold miss vs hot hit

  variable arr
  15 allot

  variable i
  variable sum

  0 i !
  begin i @ 16 < while
    i @ 1 +        ( value = i+1 )
    arr i @ +      ( addr = arr + i )
    !
    i @ 1 + i !
  repeat

  0 sum !
  0 i !
  begin i @ 16 < while
    arr i @ + @ sum @ + sum !
    i @ 1 + i !
  repeat
  sum @ . cr

  0 sum !
  0 i !
  begin i @ 16 < while
    arr i @ + @ sum @ + sum !
    i @ 1 + i !
  repeat
  sum @ . cr
